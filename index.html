<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enrollify helps international students find the right study pathway in New Zealand. Explore courses, career guides, visa requirements, costs and student life. Book a free consultation today."
    />
    <title>Study in New Zealand | Find Your Course, Career &amp; Visa Guide | Enrollify</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,600;0,6..12,700;0,6..12,800;1,6..12,400&family=Poppins:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Hidden forms for Netlify build-time detection (SPA submits via fetch) -->
    <form name="provider-contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="provider-contact" />
      <input name="bot-field" />
      <input name="organisationName" />
      <input name="contactName" />
      <input name="role" />
      <input name="workEmail" />
      <input name="phone" />
      <input name="countryRegion" />
      <textarea name="needsDescription"></textarea>
      <input name="consent" type="checkbox" />
    </form>
    <form name="student-interest" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="student-interest" />
      <input name="bot-field" />
      <input name="fullName" />
      <input name="email" />
      <input name="countryOfResidence" />
      <select name="studyLevel">
        <option value="undergraduate">Undergraduate</option>
        <option value="postgraduate">Postgraduate</option>
        <option value="pathway">Pathway / foundation</option>
        <option value="other">Other</option>
      </select>
      <input name="areaOfStudy" />
      <input name="consent" type="checkbox" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
