[build]
  command = "npm run build && if [ -n \"$BACKEND_URL\" ]; then printf '/api/*  %s/api/:splat  200!\\n' \"$BACKEND_URL\" >> dist/_redirects; fi"
  publish = "dist"

# Blog OG injection for social crawlers (GET/HEAD /blog/:slug only)
[[edge_functions]]
  function = "blog-og"
  path = "/blog/*"

# Apex → www canonical redirect
[[redirects]]
  from = "https://enrollifyedu.com/*"
  to = "https://www.enrollifyedu.com/:splat"
  status = 301
  force = true

# Serve build-time OG shells before SPA catch-all
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug/index.html"
  status = 200

# Form submissions use Netlify Forms (detected from hidden forms in index.html).
# Email notifications are configured in the Netlify dashboard:
#   Site configuration → Forms → Form notifications
# See Documents/phase-4-integrations.md for the recipient checklist.
#
# Admin API proxy: set BACKEND_URL in Netlify env (Railway backend URL, no trailing slash).
# Example: BACKEND_URL=https://enrollify-backend.up.railway.app

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
